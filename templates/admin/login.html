<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container home-container">
    <div class="page-header">
        <div class="logo-brand">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Gonçalves & Dias">
            <div>
                <h1>Área administrativa</h1>
                <p class="home-subtitle">Entre com seu usuário e senha cadastrados</p>
            </div>
        </div>
    </div>

    {% if erro %}
    <p class="erro-box">{{ erro }}</p>
    {% endif %}

    <form method="post" class="login-form">
        <div class="form-group">
            <label for="usuario">Usuário</label>
            <input type="text" id="usuario" name="usuario" required autofocus autocomplete="username">
        </div>
        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <p class="home-admin-link">
        <a href="{{ url_for('index') }}">← Voltar à área pública</a>
    </p>
</div>
</body>
</html>
